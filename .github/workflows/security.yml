name: CyberFusion-XDR Security Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # -------------------------
    # FIXED GITLEAKS INSTALL
    # -------------------------
    - name: Install Gitleaks
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz -o gitleaks.tar.gz
        tar -xzf gitleaks.tar.gz
        chmod +x gitleaks

    - name: Run Gitleaks (Secret Scanning)
      run: |
        ./gitleaks detect --source . --no-banner --redact

    # -------------------------
    # BANDIT
    # -------------------------
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install bandit semgrep

    - name: Run Bandit (Python Security Scanner)
      run: |
        bandit -r .

    # -------------------------
    # SEMGREP
    # -------------------------
    - name: Run Semgrep (Multi-language Security Scanner)
      run: |
        semgrep scan --config auto .
